basePath: /api
definitions:
  enum.UserStatus:
    enum:
    - active
    - inactive
    - pending
    - frozen
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusInactive
    - StatusPending
    - StatusFrozen
  github_com_go-web-services_go-gateway-template_internal_dto.ActivateAccountInputDTO:
    properties:
      activation_token:
        maxLength: 255
        type: string
    required:
    - activation_token
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ActivateAccountOutputDTO:
    properties:
      user:
        $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UserDTO'
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.AuthProviderDTO:
    properties:
      type:
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.CheckForgotPasswordTokenInputDTO:
    properties:
      forgot_password_token:
        maxLength: 255
        type: string
    required:
    - forgot_password_token
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.CheckForgotPasswordTokenOutputDTO:
    properties:
      valid:
        type: boolean
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.EventSendOutputDTO:
    properties:
      message:
        example: success
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.EventSendRequestDTO:
    properties:
      distinct_id:
        example: anon_6ba7b810-9dad-11d1-80b4-00c04fd430c8
        type: string
      message_id:
        description: MessageID is optional; when set it must be a UUID (idempotency
          key). Omit entirely or use a real UUID — not Swagger’s placeholder "string".
        type: string
      name:
        example: page_viewed
        maxLength: 255
        type: string
      occurred_at:
        example: "2026-04-12T10:30:00.123Z"
        type: string
      payload:
        additionalProperties: {}
        type: object
      session_id:
        example: sess_01j8xyz
        type: string
    required:
    - distinct_id
    - name
    - occurred_at
    - payload
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordFinishInputDTO:
    properties:
      cf_turnstile_response:
        type: string
      delete_sessions:
        type: boolean
      forgot_password_token:
        maxLength: 255
        type: string
      new_password:
        maxLength: 255
        type: string
    required:
    - cf_turnstile_response
    - forgot_password_token
    - new_password
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordFinishOutputDTO:
    properties:
      message:
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordStartInputDTO:
    properties:
      cf_turnstile_response:
        type: string
      email:
        maxLength: 320
        type: string
    required:
    - cf_turnstile_response
    - email
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordStartOutputDTO:
    properties:
      message:
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.GoogleSSOCallbackInputDTO:
    properties:
      code:
        maxLength: 512
        type: string
      state:
        maxLength: 512
        type: string
    required:
    - code
    - state
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.GoogleSSOCallbackOutputDTO:
    properties:
      is_new_user:
        type: boolean
      user:
        $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UserDTO'
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.GoogleSSOGetLinkOutputDTO:
    properties:
      auth_url:
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ListAuthProvidersOutputDTO:
    properties:
      auth_providers:
        items:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.AuthProviderDTO'
        type: array
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.LoginInputDTO:
    properties:
      cf_turnstile_response:
        type: string
      email:
        maxLength: 320
        type: string
      password:
        maxLength: 255
        type: string
    required:
    - cf_turnstile_response
    - email
    - password
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.LoginOutputDTO:
    properties:
      user:
        $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UserDTO'
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.LogoutOutputDTO:
    properties:
      message:
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.OTPLoginInputDTO:
    properties:
      cf_turnstile_response:
        type: string
      email:
        maxLength: 320
        type: string
      otp:
        maxLength: 6
        type: string
    required:
    - cf_turnstile_response
    - email
    - otp
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.OTPLoginOutputDTO:
    properties:
      user:
        $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UserDTO'
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.OTPSignupInputDTO:
    properties:
      cf_turnstile_response:
        type: string
      email:
        maxLength: 320
        type: string
    required:
    - cf_turnstile_response
    - email
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.OTPSignupOutputDTO:
    properties:
      user:
        $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UserDTO'
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ResendActivationEmailInputDTO:
    properties:
      cf_turnstile_response:
        type: string
      email:
        maxLength: 320
        type: string
    required:
    - cf_turnstile_response
    - email
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.ResendActivationEmailOutputDTO:
    properties:
      message:
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.SignupInputDTO:
    properties:
      cf_turnstile_response:
        type: string
      email:
        maxLength: 320
        type: string
      password:
        maxLength: 255
        type: string
      username:
        maxLength: 64
        type: string
    required:
    - cf_turnstile_response
    - email
    - password
    - username
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.SignupOutputDTO:
    properties:
      message:
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.UpdateUserInputDTO:
    properties:
      new_password:
        maxLength: 255
        type: string
      old_password:
        maxLength: 255
        type: string
      username:
        maxLength: 64
        type: string
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.UpdateUserOutputDTO:
    properties:
      user:
        $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UserDTO'
    type: object
  github_com_go-web-services_go-gateway-template_internal_dto.UserDTO:
    properties:
      created_at:
        type: string
      email:
        type: string
      has_password:
        type: boolean
      id:
        type: string
      status:
        $ref: '#/definitions/enum.UserStatus'
      username:
        type: string
    type: object
info:
  contact: {}
  description: Gateway template exposing user, auth, and event HTTP APIs
  title: Go Gateway Template API
  version: "1.0"
paths:
  /v1/auth/activate-account:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Activate Account Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ActivateAccountInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ActivateAccountOutputDTO'
      summary: Confirm user email with activation token.
      tags:
      - Auth
  /v1/auth/activate-account/resend:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Resend Activation Email Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ResendActivationEmailInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ResendActivationEmailOutputDTO'
      summary: Resend activation email for pending users.
      tags:
      - Auth
  /v1/auth/forgot-password/check-token:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Check Forgot Password Token Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.CheckForgotPasswordTokenInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.CheckForgotPasswordTokenOutputDTO'
      summary: Check if forgot password token is valid and not expired.
      tags:
      - Auth
  /v1/auth/forgot-password/finish:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Forgot Password Finish Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordFinishInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordFinishOutputDTO'
      summary: Update user password (finish forgot password flow).
      tags:
      - Auth
  /v1/auth/forgot-password/start:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Forgot Password Start Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordStartInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ForgotPasswordStartOutputDTO'
      summary: Generate password reset token and expiration date (start forgot password
        flow).
      tags:
      - Auth
  /v1/auth/google-sso/callback:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Google SSO Callback Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.GoogleSSOCallbackInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.GoogleSSOCallbackOutputDTO'
      summary: Handle Google SSO callback.
      tags:
      - Auth
  /v1/auth/google-sso/get-link:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.GoogleSSOGetLinkOutputDTO'
      summary: Get Google SSO authentication link.
      tags:
      - Auth
  /v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Login Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.LoginInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.LoginOutputDTO'
      summary: Perform user login.
      tags:
      - Auth
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.LogoutOutputDTO'
      summary: Perform user logout.
      tags:
      - Auth
  /v1/auth/otp/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send OTP Login Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.OTPLoginInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.OTPLoginOutputDTO'
      summary: Login with OTP.
      tags:
      - Auth
  /v1/auth/otp/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send OTP Signup Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.OTPSignupInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.OTPSignupOutputDTO'
      summary: Request OTP for signup.
      tags:
      - Auth
  /v1/auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Send Signup Request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.SignupInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.SignupOutputDTO'
      summary: Create a new user account.
      tags:
      - Auth
  /v1/events/send:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event payload from the client
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.EventSendRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.EventSendOutputDTO'
      summary: Track an analytics event
      tags:
      - Events
  /v1/users/me:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UserDTO'
      summary: Get current authenticated user information.
      tags:
      - Users
  /v1/users/providers/list:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.ListAuthProvidersOutputDTO'
      summary: List user's auth providers.
      tags:
      - Users
  /v1/users/update:
    post:
      consumes:
      - application/json
      parameters:
      - description: Update user request
        in: body
        name: SendRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UpdateUserInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-web-services_go-gateway-template_internal_dto.UpdateUserOutputDTO'
      summary: Update user information.
      tags:
      - Users
swagger: "2.0"
