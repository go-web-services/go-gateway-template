resolver 127.0.0.11 valid=30s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Grafana: observability stack container name (observability/docker-compose.yml → lmk-obs-grafana:3000).
# VPN-only for / (not for ACME): map grafana.lomank.com → WireGuard server IP in /etc/hosts (or split DNS).
# Change 10.8.0.0/24 if your wg0 subnet differs.
# TLS: expand the existing cert so this hostname is a SAN, e.g.
#   certbot certonly --webroot -w /var/www/certbot --expand \
#     -d lomank.com -d www.lomank.com -d grafana.lomank.com
# (live dir stays /etc/letsencrypt/live/lomank.com when the first -d is unchanged.)

server {
    listen 80;
    listen 443 ssl;
    server_name grafana.lomank.com;

    ssl_certificate     /etc/letsencrypt/live/lomank.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lomank.com/privkey.pem;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        allow 10.8.0.0/24;
        deny all;

        set $grafana_upstream http://lmk-obs-grafana:3000;
        proxy_pass $grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300;
    }
}

server {
    listen 80;
    listen 443 ssl;
    server_name lomank.com www.lomank.com;

    # Let’s Encrypt on host: certbot -d lomank.com -d www.lomank.com (live dir is lomank.com)
    # Image ships a self-signed at the same paths for local dev; prod bind-mounts /etc/letsencrypt from the host
    ssl_certificate     /etc/letsencrypt/live/lomank.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lomank.com/privkey.pem;

    # Let's Encrypt HTTP-01: certbot --webroot -w /var/www/certbot (host path, mounted below)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location /api {
        set $backend http://go-gateway-template:8009;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend http://lmk-fe-website:3010;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
